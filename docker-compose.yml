version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: loy_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: loy_store
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - loy_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: loy_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - loy_redis_data:/data

volumes:
  loy_postgres_data:
  loy_redis_data:
